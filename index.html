<!-- SECTION 2 -->
<div class="section">
  <h2>Complete Your Activation</h2>

  <p>Enter your name to send the message automatically:</p>
  <input type="text" id="username" placeholder="Your Name" style="padding:10px; width:80%; margin-bottom:10px; border-radius:5px; border:none;">

  <a href="#" id="whatsappBtn" class="btn whatsapp">
    👉 Click here to message on WhatsApp
  </a>

  <ul style="margin-top:15px;">
    <li>Save this number: <strong>0707 587 8693</strong></li>
    <li>The message will be automatically pre-filled:</li>
    <li><strong>"Registration Complete + Your Name"</strong></li>
    <li>Attach your registration card</li>
  </ul>
</div>

<script>
  const btn = document.getElementById('whatsappBtn');
  const input = document.getElementById('username');

  btn.addEventListener('click', () => {
    const name = encodeURIComponent(input.value.trim() || ''); 
    const message = encodeURIComponent(`Registration Complete ${name}`);
    const url = `https://wa.me/2347075878693?text=${message}`;
    window.open(url, '_blank');
  });
</script>
