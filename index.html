<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Registration</title>

<style>
body {
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}
.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}
input {
  width: 90%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}
button {
  padding: 14px 20px;
  background: #00ff88;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Payment Successful ✅</h2>
<p>Complete your registration to access the training group</p>

<input type="text" id="name" placeholder="Full Name">
<input type="text" id="phone" placeholder="Phone Number">
<input type="text" id="email" placeholder="Email (optional)">

<br>

<button onclick="sendToWhatsApp()">Submit & Continue</button>

</div>

<script>
function sendToWhatsApp() {
  var name = document.getElementById("name").value;
  var phone = document.getElementById("phone").value;
  var email = document.getElementById("email").value;

  var message = "New Registration:%0A"
              + "Name: " + name + "%0A"
              + "Phone: " + phone + "%0A"
              + "Email: " + email;

  var url = "https://wa.me/2349060241087?text=" + message;

  window.open(url, "_blank");
}
</script>

</body>
</html>
